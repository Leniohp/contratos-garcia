<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Contratos — Grupo Garcia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2230; --panel2:#222d3d; --ink:#e8edf4;
    --muted:#8a98ad; --line:#2c3a4d; --head:#16202e; --accent:#d9a441;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;-webkit-font-smoothing:antialiased}
  header{padding:22px 32px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#16202e,#0f1419)}
  h1{margin:0;font-size:24px;letter-spacing:.3px}
  .sub{color:var(--muted);font-size:13px;margin-top:4px;font-family:Arial,sans-serif}
  .bar{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-top:14px;font-family:Arial,sans-serif}
  .pill{background:var(--accent);color:#1a1206;border:none;border-radius:22px;padding:10px 18px;font-size:14px;font-weight:bold;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:Arial,sans-serif}
  .pill svg{width:16px;height:16px}
  .whoami{font-size:12px;color:var(--muted);font-family:Arial,sans-serif}
  .wrap{padding:24px 32px 60px;max-width:900px;margin:0 auto}
  .busca-wrap{position:relative;margin-bottom:12px}
  .busca-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted);pointer-events:none}
  #busca{width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--accent);border-radius:10px;padding:12px 40px 12px 42px;font-size:14px;font-family:Arial,sans-serif}
  #busca:focus{outline:none;border-color:#f0c46a}
  .busca-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;display:none}
  .busca-clear.on{display:block}
  .filtro-mes-wrap{display:flex;gap:10px;align-items:center;margin-bottom:16px;font-family:Arial,sans-serif;flex-wrap:wrap}
  #filtroMes{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:14px;font-family:Arial,sans-serif;min-width:180px}
  .filtro-tag{display:none;align-items:center;gap:8px;background:#2a2410;border:1px solid var(--accent);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--accent)}
  .filtro-tag.on{display:inline-flex}
  .filtro-tag button{background:none;border:0;color:var(--accent);cursor:pointer;font-size:16px;line-height:1;padding:0}
  .empty{text-align:center;color:var(--muted);font-family:Arial,sans-serif;padding:60px 20px;font-size:14px}
  .empty svg{width:46px;height:46px;opacity:.4;margin-bottom:14px}
  .clist{display:flex;flex-direction:column;gap:12px}
  .citem{display:flex;gap:16px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;font-family:Arial,sans-serif}
  .cdate{min-width:64px;text-align:center;background:var(--panel2);border-radius:10px;padding:9px 6px;flex-shrink:0}
  .cdate .d{font-size:20px;font-weight:bold;line-height:1}
  .cdate .m{font-size:11px;color:var(--muted);margin-top:3px;text-transform:lowercase}
  .cmain{flex:1;min-width:0}
  .ctitle{font-size:16px;font-weight:bold;font-family:Georgia,serif;margin:0 0 4px}
  .cdesc{font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 8px;white-space:pre-wrap}
  .cfile{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);text-decoration:none;word-break:break-all}
  .cfile svg{width:14px;height:14px}
  .cnofile{font-size:12px;color:var(--muted);font-style:italic}
  .cactions{display:flex;gap:7px;flex-shrink:0}
  .cactions button{border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:8px;padding:8px 10px;cursor:pointer}
  .cactions button:hover{border-color:var(--accent)}
  .cactions button svg{width:16px;height:16px;display:block}
  .cactions .del:hover{border-color:#7a3a3a;color:#e06464}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;font-family:Arial,sans-serif;padding:18px}
  .modal.on{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(480px,96vw);max-height:90vh;overflow:auto}
  .card h3{margin:0;padding:18px 22px;border-bottom:1px solid var(--line);font-family:Georgia,serif;font-size:17px;display:flex;align-items:center;justify-content:space-between}
  .card .body{padding:20px 22px;display:flex;flex-direction:column;gap:15px}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
  input,textarea{width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;font-family:Arial,sans-serif}
  textarea{resize:vertical}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:22px;text-align:center;color:var(--muted);cursor:pointer;font-size:13px;transition:.15s}
  .drop:hover,.drop.drag{border-color:var(--accent);background:#2a2410;color:var(--ink)}
  .drop svg{width:22px;height:22px;display:block;margin:0 auto 6px}
  .drop .has{color:var(--accent);font-weight:bold}
  .btnsave{background:var(--accent);color:#1a1206;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif}
  .btnsave:disabled{opacity:.6;cursor:default}
  .close{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;background:none;border:0}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--panel2);border:1px solid var(--accent);padding:12px 18px;border-radius:10px;font-family:Arial,sans-serif;font-size:13px;display:none;z-index:60;max-width:340px}
  #authScreen{display:none;min-height:100vh;align-items:center;justify-content:center;font-family:Arial,sans-serif;padding:20px}
  .authbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(400px,94vw);padding:34px;text-align:center}
  .authbox h2{margin:0 0 4px;font-family:Georgia,serif}
  .authbox p{color:var(--muted);font-size:13px;margin:0 0 22px}
  .authbox button{background:var(--accent);color:#1a1206;border:none;border-radius:9px;padding:11px 20px;font-weight:bold;cursor:pointer;width:100%}
  #app{display:none}
  .voltabar{display:none;gap:10px;align-items:center;background:#16202e;border-bottom:1px solid var(--line);padding:12px 32px;font-family:Arial,sans-serif}
  .voltabar.on{display:flex}
  .voltabar button{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .voltabar button:hover{border-color:var(--accent)}
  .voltabar button svg{width:15px;height:15px}
  .voltabar .vinfo{color:var(--muted);font-size:12px;margin-left:auto}
  #btnVoltarRMA{animation:piscaBtn 1.1s ease-in-out 5}
  #btnVoltarRMA:hover{animation:none}
  @keyframes piscaBtn{0%,100%{background:var(--panel2);border-color:var(--line);box-shadow:none}50%{background:#4a3c10;border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,164,65,.25)}}
</style>
</head>
<body>

<div id="authScreen">
  <div class="authbox">
    <h2>Contratos</h2>
    <p>Grupo Garcia — acesso restrito</p>
    <p style="color:#4fd17e">Para ver os contratos, entre primeiro no aplicativo Garcia Agro.</p>
    <button onclick="(window.top||window).location.reload()">Voltar ao app</button>
  </div>
</div>

<div id="app">
<div class="voltabar" id="voltabar">
  <button id="btnVoltarRMA" onclick="voltarRMA()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Voltar ao RMA</button>
  <button onclick="voltarModulos()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Voltar aos módulos</button>
  <span class="vinfo">Você veio do módulo Solicitações RMA</span>
</div>
<header>
  <h1>Contratos do grupo</h1>
  <div class="sub">Grupo Garcia — Recuperação Judicial · documentos contratuais <span id="contador" style="color:var(--accent);font-weight:bold"></span></div>
  <div class="bar">
    <button class="pill" id="btnNovo" onclick="abrirNovo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Novo cadastro
    </button>
    <span class="whoami" id="whoami"></span>
  </div>
</header>
<div class="wrap">
  <div class="busca-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="busca" type="text" inputmode="numeric" maxlength="4"
      placeholder="Buscar contrato — 4 últimos números antes do -ano (ex: 1825)"
      oninput="onBusca()">
    <button class="busca-clear" id="buscaClear" onclick="limparBusca()" title="Limpar" aria-label="Limpar">×</button>
  </div>
  <div class="filtro-mes-wrap">
    <label style="margin:0;color:var(--muted);font-size:13px">Mês:</label>
    <select id="filtroMes" onchange="onFiltroMes()"><option value="">Todos os meses</option></select>
    <span class="filtro-tag" id="filtroTag"><span id="filtroTagTxt"></span><button onclick="limparFiltroMes()" title="Limpar filtro" aria-label="Limpar filtro">×</button></span>
  </div>
  <div id="lista"></div>
</div>
</div>

<!-- MODAL CADASTRO/EDIÇÃO -->
<div class="modal" id="formModal">
  <div class="card">
    <h3><span id="formTitle">Novo contrato</span><button class="close" onclick="fecharForm()">×</button></h3>
    <div class="body">
      <div>
        <label>Data</label>
        <input type="date" id="f_data">
      </div>
      <div>
        <label>Título</label>
        <input type="text" id="f_titulo" placeholder="Ex: Contrato de arrendamento…">
      </div>
      <div>
        <label>Descrição</label>
        <textarea id="f_desc" rows="3" placeholder="Detalhes do contrato…"></textarea>
      </div>
      <div>
        <label>Arquivo do contrato</label>
        <div class="drop" id="drop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <span id="dropTxt">Arraste o arquivo aqui ou clique para selecionar</span>
          <input type="file" id="fileInput" style="display:none">
        </div>
      </div>
      <button class="btnsave" id="btnSave" onclick="salvar()">Salvar contrato</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://rgvqzxbprnxffjkgmman.supabase.co";
const SUPABASE_KEY = "sb_publishable_YzL3o_4epetSEsJxgIYRgQ_qsw8piEB";
const ADMIN_EMAIL  = "adm@maximagestao.com";
const EDITORES = ["adm@maximagestao.com", "garciaextratos@gmail.com"];
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sessionUser=null, contratos=[], editId=null, novoArquivo=null, podeEditar=false;

const MES_NOME=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const URL_RMA = "https://leniohp.github.io/rma-garcia/";
const URL_APP = "https://leniohp.github.io/app-garcia/";
// mês vindo do RMA no formato "abr-2026"
const MES_PARAM = new URLSearchParams(location.search).get("mes");
// filtro ativo interno no formato "AAAA-MM" (ex: 2026-06)
let filtroMesAtivo = "";

function checkParamMes(){
  if(!MES_PARAM)return "";
  // converte "abr-2026" -> "2026-04"
  const p = MES_PARAM.split("-");
  if(p.length<2)return "";
  const idx = MES_NOME.indexOf(p[0]);
  if(idx<0)return "";
  const mm = String(idx+1).padStart(2,"0");
  return `${p[1]}-${mm}`;
}

async function checkSession(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){showAuth();return;}
    sessionUser=session.user;
    const isAdmin=sessionUser.email===ADMIN_EMAIL;
    const {data:perfil}=await sb.from("perfis").select("status").eq("id",sessionUser.id).maybeSingle();
    const status=perfil?perfil.status:"pendente";
    if(!isAdmin && status!=="aprovado"){showAuth();return;}
    showApp();
  }catch(e){showAuth();}
}
function showAuth(){authScreen.style.display="flex";app.style.display="none";}
function showApp(){
  authScreen.style.display="none";app.style.display="block";
  whoami.textContent=sessionUser.email;
  podeEditar = EDITORES.includes((sessionUser.email||"").toLowerCase());
  document.getElementById("btnNovo").style.display = podeEditar ? "inline-flex" : "none";
  // se veio do RMA, mostra a barra de voltar e ativa o filtro do mês
  if(MES_PARAM){
    document.getElementById("voltabar").classList.add("on");
    filtroMesAtivo = checkParamMes();
  }
  carregar();
}

function voltarRMA(){
  const url = URL_RMA + "?app=1&v=" + Date.now();
  if(window.top && window.top!==window.self){ try{ window.top.location.href=url; return; }catch(e){} }
  window.location.href = url;
}
function voltarModulos(){
  const url = URL_APP + "?v=" + Date.now();
  if(window.top && window.top!==window.self){ try{ window.top.location.href=url; return; }catch(e){} }
  window.location.href = url;
}

async function carregar(){
  try{
    const {data,error}=await sb.from("contratos").select("*").order("data",{ascending:false});
    if(error)throw error;
    contratos=data||[];
    montarFiltroMes();
    render();
  }catch(e){toast("Erro ao carregar: "+e.message);console.error(e);}
}

function esc(s){return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// monta as opções do seletor de mês a partir das datas dos contratos
function montarFiltroMes(){
  const meses=[...new Set(contratos.filter(c=>c.data).map(c=>c.data.slice(0,7)))].sort().reverse();
  const sel=document.getElementById("filtroMes");
  sel.innerHTML=`<option value="">Todos os meses</option>`+meses.map(m=>{
    const[a,mm]=m.split("-");
    return `<option value="${m}">${MES_NOME[+mm-1]}/${a.slice(2)}</option>`;
  }).join("");
  if(filtroMesAtivo){ sel.value=filtroMesAtivo; atualizarTagFiltro(); }
}
function onFiltroMes(){
  filtroMesAtivo=document.getElementById("filtroMes").value;
  atualizarTagFiltro();
  render();
}
function limparFiltroMes(){
  filtroMesAtivo="";
  document.getElementById("filtroMes").value="";
  atualizarTagFiltro();
  render();
}
function atualizarTagFiltro(){
  const tag=document.getElementById("filtroTag");
  if(filtroMesAtivo){
    const[a,mm]=filtroMesAtivo.split("-");
    document.getElementById("filtroTagTxt").textContent="Filtrando: "+MES_NOME[+mm-1]+"/"+a.slice(2);
    tag.classList.add("on");
  }else{
    tag.classList.remove("on");
  }
}

// ===== BUSCA por 4 dígitos antes do -ano (ex.: 0040101825-2026 -> 1825) =====
function onBusca(){
  const v=document.getElementById("busca").value.replace(/\D/g,"").slice(0,4);
  document.getElementById("busca").value=v;
  document.getElementById("buscaClear").classList.toggle("on", v.length>0);
  render();
}
function limparBusca(){
  document.getElementById("busca").value="";
  document.getElementById("buscaClear").classList.remove("on");
  render();
}
// Extrai os 4 dígitos que ficam colados antes do "-ANO" no título
function quatroDigitos(titulo){
  const m=(titulo||"").match(/(\d{4})-\d{4}\b/);
  return m ? m[1] : "";
}

function render(){
  const termo=(document.getElementById("busca")?.value||"").trim();
  let lista_c = contratos;
  if(filtroMesAtivo){
    lista_c = lista_c.filter(c=>(c.data||"").slice(0,7)===filtroMesAtivo);
  }
  if(termo){
    lista_c = lista_c.filter(c=>quatroDigitos(c.titulo).startsWith(termo));
  }

  // Contador no topo
  const cont=document.getElementById("contador");
  if(cont){
    if(!contratos.length){cont.textContent="";}
    else if(termo||filtroMesAtivo){cont.textContent="· "+lista_c.length+" de "+contratos.length+" contratos";}
    else{cont.textContent="· "+contratos.length+(contratos.length===1?" contrato":" contratos");}
  }

  if(!lista_c.length){
    let msg;
    if(filtroMesAtivo){
      const[a,mm]=filtroMesAtivo.split("-");
      msg="Nenhum contrato em <b>"+MES_NOME[+mm-1]+"/"+a.slice(2)+"</b>"+(termo?" para <b>"+esc(termo)+"</b>":"")+".";
    }else if(termo){
      msg="Nenhum contrato encontrado para <b>"+esc(termo)+"</b>.";
    }else{
      msg="Nenhum contrato cadastrado ainda.<br>Clique em <b>Novo cadastro</b> para começar.";
    }
    lista.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg><br>${msg}</div>`;
    return;
  }
  lista.innerHTML=`<div class="clist">`+lista_c.map(c=>{
    let dia="--",mes="";
    if(c.data){const p=c.data.split("-");dia=p[2];mes=MES_NOME[+p[1]-1]+" "+p[0];}
    const fileHtml = c.file_path
      ? `<a class="cfile" href="#" onclick="baixar('${c.id}');return false;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg>${esc(c.filename||"arquivo")}</a>`
      : `<span class="cnofile">sem arquivo anexado</span>`;
    return `<div class="citem">
      <div class="cdate"><div class="d">${dia}</div><div class="m">${mes}</div></div>
      <div class="cmain">
        <p class="ctitle">${esc(c.titulo||"(sem título)")}</p>
        ${c.descricao?`<p class="cdesc">${esc(c.descricao)}</p>`:""}
        ${fileHtml}
      </div>
      <div class="cactions">
        ${podeEditar?`<button onclick="abrirEdit('${c.id}')" title="Editar" aria-label="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>`:""}
        ${c.file_path?`<button onclick="baixar('${c.id}')" title="Baixar" aria-label="Baixar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></button>`:""}
        ${podeEditar?`<button class="del" onclick="excluir('${c.id}')" title="Excluir" aria-label="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>`:""}
      </div>
    </div>`;
  }).join("")+`</div>`;
}

function abrirNovo(){
  editId=null;novoArquivo=null;
  formTitle.textContent="Novo contrato";
  f_data.value=new Date().toISOString().slice(0,10);
  f_titulo.value="";f_desc.value="";
  dropTxt.textContent="Arraste o arquivo aqui ou clique para selecionar";
  dropTxt.className="";
  formModal.classList.add("on");
}
function abrirEdit(id){
  const c=contratos.find(x=>x.id===id);if(!c)return;
  editId=id;novoArquivo=null;
  formTitle.textContent="Editar contrato";
  f_data.value=c.data||"";
  f_titulo.value=c.titulo||"";
  f_desc.value=c.descricao||"";
  if(c.filename){dropTxt.innerHTML=`<span class="has">${esc(c.filename)}</span><br><small>clique para trocar o arquivo</small>`;}
  else{dropTxt.textContent="Arraste o arquivo aqui ou clique para selecionar";}
  formModal.classList.add("on");
}
function fecharForm(){formModal.classList.remove("on");}

drop.onclick=()=>fileInput.click();
fileInput.onchange=e=>{const f=e.target.files[0];if(f){novoArquivo=f;dropTxt.innerHTML=`<span class="has">${esc(f.name)}</span><br><small>clique para trocar</small>`;}};
drop.ondragover=e=>{e.preventDefault();drop.classList.add("drag");};
drop.ondragleave=()=>drop.classList.remove("drag");
drop.ondrop=e=>{e.preventDefault();drop.classList.remove("drag");const f=e.dataTransfer.files[0];if(f){novoArquivo=f;dropTxt.innerHTML=`<span class="has">${esc(f.name)}</span><br><small>clique para trocar</small>`;}};

async function salvar(){
  if(!podeEditar){toast("Você não tem permissão para cadastrar contratos.");return;}
  const data=f_data.value, titulo=f_titulo.value.trim(), descricao=f_desc.value.trim();
  if(!titulo){toast("Informe o título.");return;}
  if(!data){toast("Informe a data.");return;}
  btnSave.disabled=true;btnSave.textContent="Salvando...";
  try{
    let filename=null, file_path=null;
    const existente = editId ? contratos.find(x=>x.id===editId) : null;
    if(existente){filename=existente.filename;file_path=existente.file_path;}
    if(novoArquivo){
      const ext=(novoArquivo.name.split(".").pop()||"dat").toLowerCase();
      const safe=`${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
      const {error:upErr}=await sb.storage.from("contratos").upload(safe,novoArquivo,{upsert:true});
      if(upErr)throw upErr;
      if(existente && existente.file_path){await sb.storage.from("contratos").remove([existente.file_path]).catch(()=>{});}
      filename=novoArquivo.name;file_path=safe;
    }
    const payload={data,titulo,descricao,filename,file_path,enviado_por:sessionUser.email};
    if(editId){
      const {error}=await sb.from("contratos").update(payload).eq("id",editId);
      if(error)throw error;
      toast("Contrato atualizado ✓");
    }else{
      const {error}=await sb.from("contratos").insert(payload);
      if(error)throw error;
      toast("Contrato cadastrado ✓");
    }
    fecharForm();await carregar();
  }catch(e){toast("Erro ao salvar: "+e.message);console.error(e);}
  btnSave.disabled=false;btnSave.textContent="Salvar contrato";
}

async function baixar(id){
  const c=contratos.find(x=>x.id===id);if(!c||!c.file_path)return;
  try{
    const {data,error}=await sb.storage.from("contratos").createSignedUrl(c.file_path,3600);
    if(error)throw error;
    window.open(data.signedUrl,"_blank");
  }catch(e){toast("Erro ao baixar.");console.error(e);}
}

async function excluir(id){
  if(!podeEditar){toast("Você não tem permissão para excluir contratos.");return;}
  const c=contratos.find(x=>x.id===id);if(!c)return;
  if(!confirm(`Excluir o contrato "${c.titulo||""}"? Esta ação não pode ser desfeita.`))return;
  try{
    if(c.file_path)await sb.storage.from("contratos").remove([c.file_path]).catch(()=>{});
    const {error}=await sb.from("contratos").delete().eq("id",id);
    if(error)throw error;
    toast("Contrato excluído.");await carregar();
  }catch(e){toast("Erro ao excluir: "+e.message);console.error(e);}
}

let toastT;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",4000);}

checkSession();
</script>
